<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="shopify-api-key" content="%VITE_SHOPIFY_API_KEY%" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      // One-time cache flush: bump APP_BUILD_ID to drop service workers + Cache Storage
      // for every browser. NO location.reload() — Shopify partitions sessionStorage
      // inside iframes, so the "already reloaded" guard never sticks and the page
      // ends up in an infinite reload loop = blank screen. Letting the current
      // page proceed is fine because <meta Cache-Control="no-cache"> is set.
      (function(){
        var APP_BUILD_ID = 'v9-2026-05-02-polaris-viz';
        try {
          var stored = localStorage.getItem('app_build_id');
          if (stored !== APP_BUILD_ID) {
            try { localStorage.setItem('app_build_id', APP_BUILD_ID); } catch (e) {}
            if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
              navigator.serviceWorker.getRegistrations()
                .then(function(regs){ regs.forEach(function(r){ r.unregister(); }); })
                .catch(function(){});
            }
            if (window.caches && caches.keys) {
              caches.keys()
                .then(function(keys){ return Promise.all(keys.map(function(k){ return caches.delete(k); })); })
                .catch(function(){});
            }
          }
        } catch (e) {}
      })();
    </script>
    <!-- Inter font (matches the Shopify admin chrome around our iframe) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <title>Google Analytics — v4</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
